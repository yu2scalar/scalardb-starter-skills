# Generated by scalardb-starter-skills/scalardb-start-sample-db
#
# Demo PostgreSQL + MySQL for trying out ScalarDB Cluster.
# *** DEMO USE ONLY ***
#   - Fixed credentials: scalaradmin / scalaradmin
#   - No persistence: emptyDir volumes — ALL DATA IS LOST when a pod restarts
#   - No TLS, no network policies
# Never use this manifest in production.
apiVersion: v1
kind: Namespace
metadata:
  name: scalardb-sample-db
  labels:
    app.kubernetes.io/managed-by: scalardb-starter-skills
---
apiVersion: v1
kind: Secret
metadata:
  name: sample-db-credentials
  namespace: scalardb-sample-db
type: Opaque
stringData:
  username: scalaradmin
  password: scalaradmin
---
# --- PostgreSQL -------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: scalardb-sample-db
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: sample-db-credentials
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sample-db-credentials
                  key: password
            # ScalarDB creates one schema per namespace inside this database.
            - name: POSTGRES_DB
              value: scalardb
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "scalaradmin", "-d", "scalardb"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        # Demo only: data does not survive pod restarts.
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: scalardb-sample-db
  labels:
    app: postgres
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
# --- MySQL ------------------------------------------------------------------
# ScalarDB creates one database per namespace on MySQL, so the demo user needs
# global privileges; this init script grants them on first boot.
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init
  namespace: scalardb-sample-db
data:
  grant.sql: |
    GRANT ALL PRIVILEGES ON *.* TO 'scalaradmin'@'%' WITH GRANT OPTION;
    FLUSH PRIVILEGES;
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: scalardb-sample-db
  labels:
    app: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.4
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sample-db-credentials
                  key: password
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: sample-db-credentials
                  key: username
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sample-db-credentials
                  key: password
          readinessProbe:
            exec:
              command: ["bash", "-c", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$MYSQL_ROOT_PASSWORD\""]
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
            - name: init
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        # Demo only: data does not survive pod restarts.
        - name: data
          emptyDir: {}
        - name: init
          configMap:
            name: mysql-init
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: scalardb-sample-db
  labels:
    app: mysql
spec:
  type: ClusterIP
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
